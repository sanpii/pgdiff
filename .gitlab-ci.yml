image: "rust:latest"

stages:
    - lint
    - test
    - apply

variables:
    CARGO_HOME: $CI_PROJECT_DIR/cargo
    PG_VERSION: 18

lint:fmt:
    stage: lint
    before_script:
        - rustup component add rustfmt
    script:
        - cargo fmt -- --check

lint:clippy:
    stage: lint
    before_script:
        - echo "deb http://apt.postgresql.org/pub/repos/apt trixie-pgdg main" > /etc/apt/sources.list.d/pgdg.list
        - curl https://www.postgresql.org/media/keys/ACCC4CF8.asc | apt-key add -
        - apt update -yqq
        - apt install -yqq postgresql-$PG_VERSION clang libpq-dev
        - rustup component add clippy
    script: cargo clippy --all-targets -- --deny warnings

.test: &test
    stage: test
    before_script:
        - MODE=$(echo "$CI_JOB_NAME" | cut -d ':' -f 2)
        - test "$MODE" == "release" && CARGO_FLAGS='--release' || CARGO_FLAGS=''
        - echo "deb http://apt.postgresql.org/pub/repos/apt trixie-pgdg main" > /etc/apt/sources.list.d/pgdg.list
        - curl https://www.postgresql.org/media/keys/ACCC4CF8.asc | apt-key add -
        - apt update -yqq
        - apt install -yqq sudo postgresql-$PG_VERSION locales clang libpq-dev
        - echo "en_US UTF-8" > /etc/locale.gen
        - locale-gen en_US.UTF-8
        - sudo -u postgres pg_ctlcluster $PG_VERSION main start
        - sudo -u postgres psql --command "create role root WITH LOGIN ENCRYPTED PASSWORD '1234' SUPERUSER;";
        - sudo -u postgres psql --command "create database old with owner root;";
        - sudo -u postgres psql --command "create database new with owner root;";
        - export OLD_URL='postgres://root:1234@localhost/old'
        - export NEW_URL='postgres://root:1234@localhost/new'
    script:
        - cargo test $CARGO_FLAGS

test:debug:
    <<: *test

test:release:
    <<: *test

apply:release: &test
    stage: apply
    script:
        - RESTRICT_KEY=$(tr -dc A-Za-z0-9 </dev/urandom | head -c 63)
        - sudo -u postgres pg_dump --schema-only --restrict-key=$RESTRICT_KEY new > new.dump
        - sudo -u postgres psql --file tests/diff.sql old
        - sudo -u postgres pg_dump --schema-only --restrict-key=$RESTRICT_KEY old > old.dump
        - diff -u old.dump new.dump

cache:
    paths:
        - $CARGO_HOME
        - target/
